name: Weekly job snapshot

on:
  schedule:
    - cron: "0 13 * * 1"   # 1pm UTC every Monday -- adjust as you like
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly scraper
        run: python scraper.py weekly

      - name: Commit updated state + excel
        run: |
          git config user.name "job-agent-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Weekly snapshot: $(date -u +'%Y-%m-%d')"
          git push
