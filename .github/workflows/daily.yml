name: Daily job check

on:
  schedule:
    - cron: "0 13 * * *"   # 1pm UTC every day -- adjust to your timezone preference
  workflow_dispatch: {}     # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily scraper
        run: python scraper.py daily

      - name: Commit updated state + excel
        run: |
          git config user.name "job-agent-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily update: $(date -u +'%Y-%m-%d')"
          git push
